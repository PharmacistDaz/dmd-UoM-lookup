<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#185FA5">
<meta name="description" content="NHS dm+d unit and qualifier lookup">
<link rel="manifest" href="manifest.json">
<title>dm+d Lookup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;min-height:100dvh;color:#1a1a1a;padding-bottom:env(safe-area-inset-bottom)}
.app-header{background:#185FA5;color:#fff;padding:16px 20px 14px;padding-top:calc(16px + env(safe-area-inset-top));position:sticky;top:0;z-index:10}
.app-header h1{font-size:17px;font-weight:600}
.app-header p{font-size:12px;opacity:.75;margin-top:2px}
.search-section{background:#fff;border-bottom:.5px solid #ddd;padding:12px 16px}
.search-row{display:flex;gap:8px;align-items:center}
.search-input{flex:1;font-size:16px;padding:11px 14px;border:1px solid #c8c5bc;border-radius:10px;background:#f8f9fa;color:#1a1a1a;outline:none;-webkit-appearance:none;min-height:44px}
.search-input:focus{border-color:#185FA5;background:#fff;box-shadow:0 0 0 3px rgba(24,95,165,.12)}
.search-input::placeholder{color:#aaa}
.clear-btn{min-height:44px;min-width:44px;padding:0 14px;border:1px solid #c8c5bc;border-radius:10px;background:#f8f9fa;color:#5F5E5A;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.clear-btn:active{background:#e8e6e0}
.content{padding:16px;padding-bottom:calc(32px + env(safe-area-inset-bottom))}
.hint{font-size:14px;color:#888780;line-height:1.6;padding:8px 0}
</style>
<style>
.result-card{background:#fff;border-radius:12px;border:.5px solid #e0ddd4;padding:16px;margin-top:4px}
.concept-pill{display:inline-block;font-family:'SF Mono','Fira Code','Courier New',monospace;font-size:12px;color:#185FA5;background:#E6F1FB;border-radius:6px;padding:3px 8px;margin-bottom:10px}
.term-name{font-size:22px;font-weight:600;color:#1a1a1a;line-height:1.3;margin-bottom:8px}
.meta-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.badge{font-size:11px;font-weight:500;background:#EAF3DE;color:#3B6D11;padding:3px 9px;border-radius:20px}
.full-term{font-size:13px;color:#888780}
.not-found-card{background:#FCEBEB;border-radius:12px;border:.5px solid #f0c0c0;padding:16px;margin-top:4px}
.not-found-card p:first-child{font-size:15px;font-weight:500;color:#A32D2D;margin-bottom:6px}
.not-found-card p:last-child{font-size:13px;color:#c05050}
.matches-label{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:#888780;margin-bottom:8px;padding-left:2px}
.match-list{background:#fff;border-radius:12px;border:.5px solid #e0ddd4;overflow:hidden;margin-top:4px}
.match-item{padding:13px 16px;border-bottom:.5px solid #eee;display:flex;justify-content:space-between;align-items:center;gap:12px;min-height:56px}
.match-item:last-child{border-bottom:none}
.match-item:active{background:#f5f5f5}
.match-left{flex:1;min-width:0}
.match-term{font-size:15px;font-weight:500;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.match-badge{font-size:11px;font-weight:500;background:#EAF3DE;color:#3B6D11;padding:2px 7px;border-radius:20px;display:inline-block;margin-top:3px}
.match-id{font-family:'SF Mono','Fira Code','Courier New',monospace;font-size:11px;color:#185FA5;background:#E6F1FB;border-radius:5px;padding:3px 7px;white-space:nowrap;flex-shrink:0}
.offline-banner{display:none;background:#faeeda;color:#633806;font-size:13px;text-align:center;padding:8px 16px}
</style>
</head>
<body>
<div class="offline-banner" id="offline-banner">You are offline - results from local cache</div>
<div class="app-header">
  <h1>dm+d Lookup</h1>
  <p>NHS unit / qualifier reference</p>
</div>
<div class="search-section">
  <div class="search-row">
    <input class="search-input" id="search-input" type="search" inputmode="text" placeholder="Concept ID or term name..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>
    <button class="clear-btn" id="clear-btn">&#x2715;</button>
  </div>
</div>
<div class="content" id="content">
  <p class="hint">Search by numeric concept ID or term name. Works offline once loaded.</p>
</div>
<script>
  const CONCEPTS = {
"8091811000001107":"bandage (qualifier value)","700476008":"Enema - unit of product usage (qualifier value)","3317211000001104":"cycle (qualifier value)","10697511000001109":"SQ-Bet (qualifier value)","8090511000001102":"larva (qualifier value)","259022006":"Square centimeter (qualifier value)","259002007":"international unit/milliliter (qualifier value)","10697411000001105":"ampoule-pair (qualifier value)","3318311000001108":"pastille (qualifier value)","429587008":"Lozenge - unit of product usage (qualifier value)","10696111000001103":"elastomeric device (qualifier value)","3317011000001109":"carton (qualifier value)","429308001":"Can - unit of product usage (qualifier value)","3318211000001100":"pack (qualifier value)","10698511000001108":"test unit (qualifier value)","10696011000001104":"plaque forming units/ml (qualifier value)","10697211000001106":"SQ-U/ml (qualifier value)","408166008":"Milligrams/16 hours (qualifier value)","408165007":"Megainternational unit (qualifier value)","408164006":"International unit/milligram (qualifier value)","408163000":"International units per gram (qualifier value)","408162005":"Kilogram/liter (qualifier value)","408168009":"Milligram/gram (qualifier value)","408169001":"Milligram/milligram (qualifier value)","408167004":"Milligrams/72 hours (qualifier value)","408170000":"Micrograms/72 hours (qualifier value)","3318111000001106":"needle (qualifier value)","408107001":"Gram/actuation (qualifier value)","408106005":"Unit/actuation (qualifier value)","408105009":"Milligram/actuation (qualifier value)","408104008":"Microgram/actuation (qualifier value)","408102007":"Unit dose (qualifier value)","10695511000001100":"cell/square cm (qualifier value)","10368211000001101":"component (qualifier value)","10693011000001107":"SQ-T (qualifier value)","3317611000001102":"lancet (qualifier value)","425565005":"Blister - unit of product usage (qualifier value)","10696711000001102":"tera vector genome (qualifier value)","3318811000001104":"ro };
Object.assign(CONCEPTS, {
"418830004":"Unit/milligram (qualifier value)","418948007":"Megabecquerel/milliliter (qualifier value)","418931004":"Gigabecquerel (qualifier value)","10693811000001101":"leech (qualifier value)","10692411000001107":"mg/application (qualifier value)","421823004":"Pad - unit of product usage (qualifier value)","418261000":"Gigabecquerel/milliliter (qualifier value)","3314611000001108":"%v/w (qualifier value)","3321311000001106":"pizza base (qualifier value)","418342002":"Microliter/milliliter (qualifier value)","418530008":"Tube - unit of product usage (qualifier value)","10693711000001109":"unit/drop (qualifier value)","3320111000001103":"dressing (qualifier value)","10692311000001100":"g/application (qualifier value)","3314511000001109":"%w/w (qualifier value)","418042005":"Microgram/centimeter2 (qualifier value)","413516001":"Ampule - unit of product usage (qualifier value)","418081005":"kiloBecquerel/milliliter (qualifier value)","426198001":"Dual dose sachet - unit of product usage (qualifier value)","10693611000001100":"drop (qualifier value)","430293001":"Suppository - unit of product usage (qualifier value)","10691717000001108":"g/dose (qualifier value)","10691811000001108":"g/dose (qualifier value)","414719002":"Micromole/milliliter (qualifier value)","419179001":"Kit - unit of product usage (qualifier value)","10691718000001108":"mg/dose (qualifier value)","10691818000001100":"mg/dose (qualifier value)","10691811000001100":"mg/dose (qualifier value)","10692811000001109":"month supply (qualifier value)","3320411000001108":"truss (qualifier value)","10692911000001104":"week supply (qualifier value)","427678004":"Disc - unit of product usage (qualifier value)","8088511000001103":"microlitre/g (qualifier value)","419691006":"Unit/centimeter2 (qualifier value)","419672006":"Bottle - unit of product usage (qualifier value)","419702001":"Patch - unit of product usage (qualifier value)","10691911000001105":"microgram/dose (qualifier value)","419346007":"Milliliter/milliliter (qualifier value)","419805009":"Milliliter/gram (qualifier value)","396169007":"Gram/milliliter (qualifier value)","396163008":"Milligram/kilogram (qualifier value)","396180007":"mL/kg (qualifier value)","428178003":"Cup - unit of product usage (qualifier value)","415818006":"Vial - unit of product usage (qualifier value)","415784009":"Unit/gram (qualifier value)","415758003":"Tuberculin unit (qualifier value)","229034000":"Megabecquerel (qualifier value)","282143001":"Kilobecquerel (qualifier value)","428641000":"Capsule - unit of product usage (qualifier value)","428639001":"Insert - unit of product usage (qualifier value)","428672001":"Bag - unit of product usage (qualifier value)","428673006":"Tablet - unit of product usage (qualifier value)","282113003":"Nanoliter (qualifier value)","8091011000001101":"generator (qualifier value)","732995004":"Film (unit of presentation)","732992001":"Cylinder (unit of presentation)","732990009":"Container (unit of presentation)","732980001":"Applicator (unit of presentation)","732981002":"Actuation (unit of presentation)","732988008":"Cartridge (unit of presentation)","428003006":"Bar - unit of product usage (qualifier value)","10698211000001105":"cassette (qualifier value)","10697011000001101":"dose step (qualifier value)","10698311000001102":"million cells (qualifier value)","411225003":"Kallikrein inactivator unit (qualifier value)","3318011000001105":"nebule (qualifier value)","10697111000001100":"SQ-U (qualifier value)","10698411000001109":"million cells/ml (qualifier value)","8083511000001107":"mg/square cm (qualifier value)","767525000":"Unit (qualifier value)","10698011000001100":"million colony forming units (qualifier value)","3319011000001100":"stocking (qualifier value)","10698111000001104":"million colony forming units/ml (qualifier value)","258673006":"Millimeter (qualifier value)","258672001":"Centimeter (qualifier value)","258669008":"meter (qualifier value)","258685003":"microgram (qualifier value)","258684004":"milligram (qualifier value)","258686002":"nanogram (qualifier value)","258683005":"kilogram (qualifier value)","258682000":"gram (qualifier value)","258702006":"hour (qualifier value)","258794004":"Gram/liter (qualifier value)","258796002":"Milligram/liter (qualifier value)","258798001":"Milligram/milliliter (qualifier value)","258770004":"Liter (qualifier value)","258774008":"Microliter (qualifier value)","258773002":"Milliliter (qualifier value)","258718000":"millimole (qualifier value)","258719008":"micromole (qualifier value)","258731005":"Parts per million (qualifier value)","733015007":"Spoonful (unit of presentation)","733012005":"Pouch (unit of presentation)","733013000":"Sachet (unit of presentation)","733017004":"Straw (unit of presentation)","733018009":"Strip (unit of presentation)","733021006":"System (unit of presentation)","733020007":"Syringe (unit of presentation)","733007009":"Pessary (unit of presentation)","733008004":"Pillule (unit of presentation)","733010002":"Plaster (unit of presentation)","258840002":"Microgram/24 hours (qualifier value)","258838007":"Microgram/hour (qualifier value)","258836006":"Milligrams/24 hours (qualifier value)","258812007":"Mole/liter (qualifier value)","258813002":"Millimole/liter (qualifier value)","258801007":"Microgram/milliliter (qualifier value)","258802000":"Microgram/gram (qualifier value)","258806002":"Nanogram/milliliter (qualifier value)","258878000":"cells/microliter (qualifier value)","258948008":"Unit/milliliter (qualifier value)","258997004":"international unit (qualifier value)"
});
function strip(term){return term.replace(/\s*\(qualifier value\)\s*$/,'').replace(/\s*\(unit of presentation\)\s*$/,'').replace(/\s*\(unit of product usage\)\s*$/,'').replace(/\s*-\s*unit of product usage\s*$/,'').trim()}
function typeOf(term){if(term.includes('unit of presentation'))return 'unit of presentation';if(term.includes('unit of product usage'))return 'unit of product usage';return 'qualifier value'}
function renderSingle(id,term){const d=strip(term),t=typeOf(term);return `<div class="result-card"><div class="concept-pill">${id}</div><div class="term-name">${d}</div><div class="meta-row"><span class="badge">${t}</span><span class="full-term">${term}</span></div></div>`}
function renderList(matches){const rows=matches.map(([id,term])=>`<div class="match-item"><div class="match-left"><div class="match-term">${strip(term)}</div><span class="match-badge">${typeOf(term)}</span></div><div class="match-id">${id}</div></div>`).join('');return `<div class="matches-label">${matches.length} matches</div><div class="match-list">${rows}</div>`}
function lookup(query){
  const content=document.getElementById('content');
  const raw=query.trim();
  if(!raw){content.innerHTML='<p class="hint">Search by numeric concept ID or term name. Works offline once loaded.</p>';return}
  if(/^\d+$/.test(raw)){
    const term=CONCEPTS[raw];
    content.innerHTML=term?renderSingle(raw,term):`<div class="not-found-card"><p>Concept ID not found</p><p>${raw} is not in this dataset. Check via NHS TRUD dm+d release files.</p></div>`
  } else {
    const q=raw.toLowerCase();
    const matches=Object.entries(CONCEPTS).filter(([,t])=>strip(t).toLowerCase().includes(q));
    if(!matches.length){content.innerHTML=`<div class="not-found-card"><p>No matches for "${raw}"</p><p>Try a partial word or enter the numeric concept ID directly.</p></div>`}
    else if(matches.length===1){content.innerHTML=renderSingle(matches[0][0],matches[0][1])}
    else{content.innerHTML=renderList(matches)}
  }
}
const input=document.getElementById('search-input');
const clearBtn=document.getElementById('clear-btn');
input.addEventListener('input',()=>lookup(input.value));
clearBtn.addEventListener('click',()=>{input.value='';lookup('');input.focus()});
const params=new URL(window.location.href).searchParams;
const seed=params.get('id')||params.get('term')||'';
if(seed)input.value=seed;
lookup(input.value);
window.addEventListener('online',()=>{document.getElementById('offline-banner').style.display='none'});
window.addEventListener('offline',()=>{document.getElementById('offline-banner').style.display='block'});
if(!navigator.onLine)document.getElementById('offline-banner').style.display='block';
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
</script>
</body>
</html>
