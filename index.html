<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="dm+d">
<meta name="theme-color" content="#185FA5" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f1923" media="(prefers-color-scheme: dark)">

<style>
:root {
  --bg:          #f0f2f5;
  --surface:     #ffffff;
  --surface2:    #f8f9fa;
  --border:      #e0ddd4;
  --border2:     #ddd;
  --text:        #1a1a1a;
  --text2:       #5a5856;
  --text3:       #999692;
  --accent:      #185FA5;
  --accent-bg:   #E6F1FB;
  --accent-ring: rgba(24,95,165,.15);
  --green-bg:    #EAF3DE;
  --green-text:  #3B6D11;
  --red-bg:      #FCEBEB;
  --red-border:  #f0c0c0;
  --red-text:    #A32D2D;
  --red-text2:   #b85050;
  --header-bg:   #185FA5;
  --header-text: #ffffff;
  --match-hover: #f5f5f3;
  --pill-font:   'SF Mono','Fira Code','Courier New',monospace;
}

/* System dark mode default */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg:          #0f1923;
    --surface:     #1a2535;
    --surface2:    #1f2d3d;
    --border:      #2a3a4d;
    --border2:     #2a3a4d;
    --text:        #e8ecf0;
    --text2:       #a0b0c0;
    --text3:       #6a8098;
    --accent:      #5ba3e0;
    --accent-bg:   #1a2e42;
    --accent-ring: rgba(91,163,224,.2);
    --green-bg:    #1a2e1a;
    --green-text:  #7ec87e;
    --red-bg:      #2e1a1a;
    --red-border:  #5a2a2a;
    --red-text:    #e07070;
    --red-text2:   #c07070;
    --header-bg:   #0f1923;
    --header-text: #e8ecf0;
    --match-hover: #1f2d3d;
  }
}

/* Manual dark override */
:root[data-theme="dark"] {
  --bg:          #0f1923;
  --surface:     #1a2535;
  --surface2:    #1f2d3d;
  --border:      #2a3a4d;
  --border2:     #2a3a4d;
  --text:        #e8ecf0;
  --text2:       #a0b0c0;
  --text3:       #6a8098;
  --accent:      #5ba3e0;
  --accent-bg:   #1a2e42;
  --accent-ring: rgba(91,163,224,.2);
  --green-bg:    #1a2e1a;
  --green-text:  #7ec87e;
  --red-bg:      #2e1a1a;
  --red-border:  #5a2a2a;
  --red-text:    #e07070;
  --red-text2:   #c07070;
  --header-bg:   #0f1923;
  --header-text: #e8ecf0;
  --match-hover: #1f2d3d;
}

/* Manual light override */
:root[data-theme="light"] {
  --bg:          #f0f2f5;
  --surface:     #ffffff;
  --surface2:    #f8f9fa;
  --border:      #e0ddd4;
  --border2:     #ddd;
  --text:        #1a1a1a;
  --text2:       #5a5856;
  --text3:       #999692;
  --accent:      #185FA5;
  --accent-bg:   #E6F1FB;
  --accent-ring: rgba(24,95,165,.15);
  --green-bg:    #EAF3DE;
  --green-text:  #3B6D11;
  --red-bg:      #FCEBEB;
  --red-border:  #f0c0c0;
  --red-text:    #A32D2D;
  --red-text2:   #b85050;
  --header-bg:   #185FA5;
  --header-text: #ffffff;
  --match-hover: #f5f5f3;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { font-size: 18px; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  min-height: 100dvh;
  color: var(--text);
  padding-bottom: env(safe-area-inset-bottom);
  transition: background 0.2s, color 0.2s;
}

/* ---- Header ---- */
.app-header {
  background: var(--header-bg);
  color: var(--header-text);
  padding: 18px 20px 14px;
  padding-top: calc(18px + env(safe-area-inset-top));
  padding-left: calc(20px + env(safe-area-inset-left));
  padding-right: calc(20px + env(safe-area-inset-right));
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.header-left h1 {
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: -0.01em;
}

.header-left p {
  font-size: 0.7rem;
  opacity: 0.65;
  margin-top: 3px;
  letter-spacing: 0.01em;
}

.theme-btn {
  background: rgba(255,255,255,0.12);
  border: none;
  border-radius: 8px;
  color: var(--header-text);
  font-size: 1rem;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
}
.theme-btn:active { background: rgba(255,255,255,0.22); }

/* ---- Search ---- */
.search-section {
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
  padding: 14px 16px;
  padding-left: calc(16px + env(safe-area-inset-left));
  padding-right: calc(16px + env(safe-area-inset-right));
}

.search-row {
  display: flex;
  gap: 10px;
  align-items: center;
}

.search-input {
  flex: 1;
  font-size: 1rem;
  padding: 13px 16px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  background: var(--surface2);
  color: var(--text);
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  min-height: 50px;
  transition: border-color 0.15s, box-shadow 0.15s, background 0.2s;
}

.search-input:focus {
  border-color: var(--accent);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--accent-ring);
}

.search-input::placeholder { color: var(--text3); }

.clear-btn {
  min-height: 50px;
  min-width: 50px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  background: var(--surface2);
  color: var(--text2);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s;
}
.clear-btn:active { background: var(--border); }

/* ---- Content ---- */
.content {
  padding: 16px;
  padding-left: calc(16px + env(safe-area-inset-left));
  padding-right: calc(16px + env(safe-area-inset-right));
  padding-bottom: calc(40px + env(safe-area-inset-bottom));
}

.hint {
  font-size: 0.85rem;
  color: var(--text3);
  line-height: 1.7;
  padding: 10px 2px;
  text-align: center;
}

/* ---- Single result ---- */
.result-card {
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 20px 18px 18px;
  margin-top: 6px;
}

.concept-pill {
  display: inline-block;
  font-family: var(--pill-font);
  font-size: 0.72rem;
  color: var(--accent);
  background: var(--accent-bg);
  border-radius: 7px;
  padding: 4px 10px;
  margin-bottom: 14px;
  letter-spacing: 0.02em;
}

.term-name {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
  margin-bottom: 12px;
  letter-spacing: -0.02em;
}

.meta-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}

.badge {
  font-size: 0.68rem;
  font-weight: 600;
  background: var(--green-bg);
  color: var(--green-text);
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.02em;
  text-transform: lowercase;
}

.full-term {
  font-size: 0.78rem;
  color: var(--text3);
  line-height: 1.5;
}

/* ---- Not found ---- */
.not-found-card {
  background: var(--red-bg);
  border-radius: 14px;
  border: 1px solid var(--red-border);
  padding: 18px;
  margin-top: 6px;
}

.not-found-card .nf-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--red-text);
  margin-bottom: 6px;
}

.not-found-card .nf-body {
  font-size: 0.8rem;
  color: var(--red-text2);
  line-height: 1.6;
}

/* ---- Match list ---- */
.matches-label {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
  padding-left: 4px;
}

.match-list {
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid var(--border);
  overflow: hidden;
  margin-top: 4px;
}

.match-item {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  min-height: 62px;
  transition: background 0.1s;
}

.match-item:last-child { border-bottom: none; }
.match-item:active { background: var(--match-hover); }

.match-left { flex: 1; min-width: 0; }

.match-term {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}

.match-highlight {
  background: var(--accent-bg);
  color: var(--accent);
  border-radius: 3px;
  padding: 0 2px;
}

.match-badge {
  font-size: 0.65rem;
  font-weight: 600;
  background: var(--green-bg);
  color: var(--green-text);
  padding: 3px 8px;
  border-radius: 20px;
  display: inline-block;
  letter-spacing: 0.02em;
}

.match-id {
  font-family: var(--pill-font);
  font-size: 0.65rem;
  color: var(--accent);
  background: var(--accent-bg);
  border-radius: 6px;
  padding: 4px 8px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ---- Offline banner ---- */
.offline-banner {
  display: none;
  background: #2e2400;
  color: #f0c060;
  font-size: 0.75rem;
  text-align: center;
  padding: 8px 16px;
  letter-spacing: 0.01em;
}
</style>
</head>

<div class="content" id="content">
